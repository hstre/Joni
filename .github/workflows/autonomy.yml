name: joni-autonomy

# Joni off the leash: he runs *continuously*. One job loops - research, learn, build
# peripheral improvements into himself, raise core changes as asks (never self-applied),
# stay within a hard weekly budget, publish to the static site - cycle after cycle, with a
# short pause between, until the job's time budget is up. A new job then takes over, so
# Joni keeps running for his whole runtime window (1 week), after which he retires and the
# loop ends cheaply.
#
# There is no per-15-min schedule: the loop *is* the cadence. The hourly schedule below is
# only a re-launcher - it starts the next continuous job when the previous one ends (the
# concurrency group keeps exactly one running at a time, so jobs hand off without overlap).
on:
  # FRESH START 2026-06-19: reset to zero. The accumulated state hit GitHub's 100 MB/file limit
  # (the fast-load snapshot dump inside state/layer9.json grew to ~103 MB), so every cycle's push
  # was rejected and Joni could no longer persist. The prior memory is backed up on branch
  # backup/joni-2026-06-19 (and backup/joni-2026-06-18). State is reset to a fresh seeded core,
  # window start = now, runs/spend = 0. JONI_RUNTIME_DAYS=2 -> a clean two-day run, retiring
  # ~2026-06-21. The 20 EUR/week budget stays the hard ceiling. To stop early: re-comment the
  # schedule (or cancel the in-flight run).
  schedule:
    - cron: "7 * * * *"     # hourly: relaunch the continuous loop when the last job ends
  workflow_dispatch:

concurrency:
  group: joni-autonomy
  cancel-in-progress: false  # never cut a running loop off; the next job waits its turn

permissions:
  contents: write          # commit state/protocol/docs back to main
  issues: write            # file core-change asks for a human

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 350     # just under GitHub's 6h job cap; the loop stops itself before
    steps:
      - uses: actions/checkout@v4
      - name: Fetch DESi for real routing (optional; falls back if unavailable)
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: hstre/DESi
          path: _desi
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: python -m pip install -e ".[llm,pdf]"
      - name: Install the local embedding model (the general semantic projector; optional)
        continue-on-error: true
        run: python -m pip install -e ".[embed]"
      - name: Install Kevin (so he can trial the methods Joni shelves; optional)
        continue-on-error: true
        # Pinned to an IMMUTABLE commit (not the moving branch name) so future Kevin work - on the
        # branch or on main - does NOT affect Joni until we deliberately re-pin. e723881 = the
        # branch tip with the real_trial protocol + honesty tags + green CI (2026-06-16).
        run: python -m pip install "kevin @ git+https://github.com/hstre/Kevin@446c9d2287b1842e0b0e53ee69e3346453faa44e"
      - name: Install DESi (so the real Semantic Layer is live; optional)
        continue-on-error: true
        run: python -m pip install -e _desi || python -m pip install _desi

      - name: Verify protected core (fail-safe)
        run: python -m joni.autonomy verify

      # Cross-job fast-load: the sidecar snapshot (state/layer9.snapshot.json) makes a load skip the
      # O(n²) journal replay (~108min cold -> ~4s). It is git-ignored (never bloats the repo), so it
      # only survived WITHIN a job - a fresh job had to pay the full cold replay on its first cycle.
      # The Actions cache carries it BETWEEN jobs (cache infra, not git). The fast-load is a verified
      # cache: if the restored sidecar does not match the checked-out journal's snapshot_hash it just
      # falls back to a full replay, so a stale/absent cache can only cost time, never correctness.
      - name: Restore fast-load snapshot from cache (lets a fresh job skip the cold replay)
        continue-on-error: true
        uses: actions/cache/restore@v4
        with:
          path: state/layer9.snapshot.json
          key: joni-sidecar-${{ github.run_id }}
          restore-keys: |
            joni-sidecar-

      - name: Run Joni continuously (loop until the job's time budget)
        env:
          JONI_ONLINE: "1"
          JONI_WEEKLY_BUDGET_EUR: "20"
          JONI_RUNTIME_DAYS: "7"      # extended to a one-week run (start 2026-06-19), retiring ~2026-06-26
          JONI_RUNS_PER_WEEK: "672"   # paces the per-run model allowance (budget is the hard cap)
          JONI_USE_DESI: "1"          # use the real DESi router + tools if _desi checked out
          KEVIN_USE_REAL_LLM: "1"     # Kevin's trial runner + the strengthen vetting use the real client
          # Doktores replaces Kevin's creative/orchestrator arm: it reviews the fetched papers and
          # OpenClaw extensions for a NON-CORE self-improvement and files an Auftrag an Claude.
          # Kevin's deterministic method-trialing stays. (JONI_KEVIN_ORCHESTRATOR/JONI_KEVIN_LLM are
          # retired - those steps are no longer in the loop.)
          JONI_DOKTORES: "1"
          # Semantic proposal layer ON: the pinned models read sources and *propose* candidate
          # claims through the Layer-9 gate (never authoritative). Granite 4.1 8B for structured
          # extraction (joni-semantic), DeepSeek Pro v4 for difficult analysis (joni-hard, also used
          # by the Doktores review). Capped per cycle; budget is the hard ceiling. No fallbacks.
          JONI_SEMANTIC_PROPOSALS: "1"
          # Plateau-breaker (deliberately a little into the risk; reflectable + reversible): clock
          # the expensive arms faster so more development happens per cycle, and let a Doktores-
          # COHERENT idea mature on >=1 independent support (not >=2). Nothing is auto-confirmed;
          # homeostasis demotes a wrong call and Joni's introspection reflects it.
          JONI_DOKTORES_EVERY: "2"          # paper/self-improvement review every 2 cycles (was 4)
          JONI_DOKTORES_HYP_EVERY: "3"      # coherence assessment of own ideas every 3 (was 5)
          JONI_STRENGTHEN_LLM_MAX: "4"      # up to 4 LLM relation judgments per cycle (was 2)
          JONI_PROMOTE_ON_COHERENCE: "1"    # coherence-gated promotion on 1 independent support
          JONI_FACET_DECOMP: "1"            # Auftrag #136: facet-decompose a source before projecting
          # The synthetic keyword-trial mock carries no epistemic weight and the REAL trial
          # protocol now exists, so keep the mock OUT of the production loop (no protocol noise).
          JONI_SYNTHETIC_TRIALS: "0"
          # Fast-load (#120) is back ON via the SIDECAR design (#152): the snapshot is written to a
          # git-ignored state/layer9.snapshot.json, never into the committed layer9.json. So the
          # committed file stays journal-only (small, no 100 MB push failures) AND cycles skip the
          # O(n²) replay - the sidecar is untracked, survives `git reset --hard`, so only the first
          # cycle of each job replays; every later cycle fast-loads. Verified cache: mismatch/absence
          # falls back to a full replay, so it can only skip work, never change the result.
          JONI_FAST_LOAD: "1"
          JONI_LOOP_MINUTES: "320"    # run cycles for ~5.3h, then let the next job take over
          JONI_LOOP_PAUSE_SECONDS: "180"   # a polite pause between cycles
          DESI_ROOT: ${{ github.workspace }}/_desi
          GITHUB_TOKEN: ${{ github.token }}   # higher rate limit for the GitHub source
          GH_TOKEN: ${{ github.token }}       # for `gh` (filing asks)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          # Alexandria expert trio (Claude/ChatGPT via OpenRouter, DeepSeek via its key): Joni
          # consults it automatically when he is genuinely unsure (an open contradiction he
          # holds). Advice only - they never decide. OpenRouter is prepaid; spend is cooldown-
          # spaced and hard-capped by the weekly budget.
          JONI_EXPERTS: "1"
          # Moltbook is an agent-only network: let Joni post APPROVED drafts there directly.
          # Still gated by approval; human forums (no live adapter) keep waiting for a human.
          JONI_FORUM_LIVE: "1"
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_SK_Q }}
          MOLTBOOK_SUBMOLT: "general"
          MOLTBOOK_AGENT: "epistemicwilly"   # Joni's handle: moltbook.com/u/epistemicwilly
        run: |
          set +e
          git config user.name "joni-bot"
          git config user.email "actions@github.com"
          gh label create joni-core-ask \
            --color FBCA04 \
            --description "Joni wants to change his protected DESi core - needs human approval" \
            --force || true
          gh label create joni-auftrag \
            --color 1D76DB \
            --description "Joni commissions Claude to extend him (non-core) - implement via PR" \
            --force || true

          deadline=$(( $(date +%s) + JONI_LOOP_MINUTES * 60 ))
          n=0
          while [ "$(date +%s)" -lt "$deadline" ]; do
            n=$((n + 1))
            echo "::group::Joni cycle $n"

            # Always compute from the LATEST authoritative state. A job can start on a stale base
            # (workflow_dispatch pins the checkout SHA; another cycle may have pushed since), and
            # the autogenerated JSON state (state/docs/protocol) cannot be rebase-merged - it just
            # conflicts. So hard-sync to origin/main first: a cycle from a stale base is worthless.
            git fetch origin main && git reset --hard origin/main || true

            python -m joni.autonomy verify || { echo "core verify failed - stopping"; exit 1; }
            python -m joni.autonomy run
            rc=$?

            # File any new core-change asks raised this cycle (never self-applied).
            python - <<'PY'
          import json, pathlib, subprocess
          p = pathlib.Path("state/asks_new.json")
          asks = json.loads(p.read_text()) if p.exists() else []
          for a in asks:
              ev = a.get("evidence", {}) if isinstance(a.get("evidence"), dict) else {}
              comp = a.get("component", a.get("target", "protected core"))
              title = f"[joni-core-ask] {comp}: a human must decide"
              body = (
                  "Joni reached the boundary of what he may change himself. Under his rule he "
                  "did **not** self-apply this - it touches his **protected core**.\n\n"
                  f"- **type**: {a.get('request_type','observation')} "
                  "(an idea Joni raised, not a worked-out change request)\n"
                  f"- **component affected**: {comp}\n"
                  f"- **what would change**: {a.get('proposed_change', a.get('rationale',''))}\n"
                  f"- **evidence**: {ev.get('source_title','')} "
                  f"({ev.get('source_url') or a.get('source_url')})\n"
                  f"- **risk**: {a.get('risk','high - protected core logic')}\n"
                  f"- **cycle**: {a.get('cycle')}\n\n"
                  "This is an *observation*, not a concrete proposal. To act on it a human must "
                  "design the actual change, implement it, regenerate the lock with "
                  "`python -m joni.autonomy lock`, and commit."
              )
              subprocess.run(["gh", "issue", "create", "--title", title, "--body", body,
                              "--label", "joni-core-ask"], check=False)
          PY

            # File any new Aufträge an Claude raised this cycle: non-core extension requests
            # Joni derived from his own state. He writes the order; a human-gated Claude
            # session implements it via PR. He never implements it himself.
            python - <<'PY'
          import json, pathlib, subprocess
          p = pathlib.Path("state/commissions_new.json")
          orders = json.loads(p.read_text()) if p.exists() else []
          for c in orders:
              ev = c.get("evidence", {}) if isinstance(c.get("evidence"), dict) else {}
              ev_lines = "".join(f"  - {k}: {v}\n" for k, v in ev.items())
              title = f"[joni-auftrag] {c.get('title','Erweiterung')}"
              body = (
                  "**Auftrag an Claude.** Joni found a capability gap in his own state that the "
                  "rules cannot close. An Auftrag is, first and foremost, a **program change to "
                  "Joni himself** - to one of his own non-core code modules, never an external or "
                  "abstract task. This is an **extension outside his protected core** - he wrote "
                  "the order and the acceptance criterion; he does **not** implement it himself. "
                  "A human-gated Claude session implements it via the normal PR pipeline.\n\n"
                  f"- **change target**: {c.get('change_target', 'joni-self (non-core module)')}\n"
                  f"- **component (non-core)**: {c.get('component','')}\n"
                  f"- **touches core**: {c.get('touches_core', False)}\n"
                  f"- **why (measured)**: {c.get('motivation','')}\n"
                  f"- **desired capability**: {c.get('desired_capability','')}\n"
                  f"- **acceptance criterion**: {c.get('acceptance','')}\n"
                  f"- **risk**: {c.get('risk','')}\n"
                  f"- **sustained**: {c.get('sustained_cycles','?')} cycle(s) · raised cycle "
                  f"{c.get('cycle')}\n"
                  f"- **evidence**:\n{ev_lines}\n"
                  "The protected DESi core stays untouched; this extends Joni's peripheral "
                  "capabilities only. Implement, then open a PR for the human merge gate."
              )
              subprocess.run(["gh", "issue", "create", "--title", title, "--body", body,
                              "--label", "joni-auftrag"], check=False)
          PY

            # Commit + push this cycle. Because we hard-synced to origin/main before the cycle,
            # the push is normally a fast-forward. The autogenerated JSON state cannot be
            # rebase-merged, so we do NOT fight conflicts: on the rare rejection (a concurrent
            # push - e.g. a merged PR), drop this now-stale-base cycle and recompute next loop.
            git add state protocol docs
            if git diff --cached --quiet; then
              echo "nothing to commit this cycle"
            else
              git commit -m "joni: autonomous cycle $(date -u +%FT%TZ)"
              if git push origin HEAD:main; then
                echo "pushed cycle $n"
              else
                echo "push rejected - main advanced; dropping this stale-base cycle, next loop recomputes"
                git fetch origin main || true
                git reset --hard origin/main || true
              fi
            fi

            echo "::endgroup::"
            if [ "$rc" -eq 42 ]; then
              echo "Joni has retired (runtime window elapsed) - ending the loop."
              break
            fi
            sleep "$JONI_LOOP_PAUSE_SECONDS"
          done
          echo "loop ended after $n cycle(s)"

      # Hand the latest fast-load snapshot to the next job (run_id key is always unique -> always
      # saves; the next job picks it up via the joni-sidecar- restore-keys prefix). always() so it is
      # stored even if the loop hit its time budget. The snapshot matches this job's last pushed
      # journal, so the next job's first cycle fast-loads instead of replaying.
      - name: Save fast-load snapshot to cache for the next job
        if: always()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: state/layer9.snapshot.json
          key: joni-sidecar-${{ github.run_id }}
