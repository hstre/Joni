name: joni-auftrag

# Joni commissions Claude to extend him (non-core). When run, Claude Code implements the
# Auftrag, opens a PR, and - once the checks are green - the PR is auto-merged (no human; only
# the protected core stays human-gated via the separate joni-core-ask path).
#
# COST: this build calls the Claude API (ANTHROPIC_API_KEY), so it is **manual-only**
# (workflow_dispatch) to avoid recurring API spend. The operator clears Joni's Aufträge by
# invoking Claude directly instead; the loop still files joni-auftrag issues as the work queue.
# Re-add the `schedule` / `issues: labeled` triggers below to make it run automatically again.
# A `joni-auftrag-wip` label marks an order as taken so it is never picked up twice.

on:
  workflow_dispatch:

permissions:
  contents: write          # push the extension branch and merge the PR
  pull-requests: write     # open and merge the PR
  issues: write            # read the order, mark it taken, comment back

concurrency:
  group: joni-auftrag       # one Auftrag at a time
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Pick the Auftrag to work on
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create joni-auftrag-wip --repo "$GITHUB_REPOSITORY" --color C5DEF5 \
            --description "A joni-auftrag Claude is currently implementing" --force || true
          if [ "${{ github.event_name }}" = "issues" ]; then
            # a human applied a label; only act on our label
            if [ "${{ github.event.label.name }}" = "joni-auftrag" ]; then
              echo "issue=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            fi
          else
            # schedule / manual: take the oldest open joni-auftrag not already in progress
            n=$(gh issue list --repo "$GITHUB_REPOSITORY" --label joni-auftrag --state open \
                  --search "-label:joni-auftrag-wip sort:created-asc" \
                  --json number --jq '.[0].number // empty')
            echo "issue=$n" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure an Anthropic key is configured (fail loudly, not silently)
        if: steps.pick.outputs.issue != ''
        env:
          KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$KEY" ]; then
            msg="Auto-build skipped: no ANTHROPIC_API_KEY secret is configured on this repo, so Claude cannot pick up this Auftrag automatically. Add the secret (Settings -> Secrets and variables -> Actions); it will be retried on the next schedule."
            gh issue comment "${{ steps.pick.outputs.issue }}" --repo "$GITHUB_REPOSITORY" --body "$msg"
            echo "no ANTHROPIC_API_KEY - cannot run Claude"
            exit 1
          fi

      - name: Mark the Auftrag as taken (so it is not picked up twice)
        if: steps.pick.outputs.issue != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue edit "${{ steps.pick.outputs.issue }}" --repo "$GITHUB_REPOSITORY" \
            --add-label joni-auftrag-wip

      - uses: actions/checkout@v4
        if: steps.pick.outputs.issue != ''
        with:
          fetch-depth: 0

      - name: Fetch DESi (so the real Semantic Layer is available; optional)
        if: steps.pick.outputs.issue != ''
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: hstre/DESi
          path: _desi

      - uses: actions/setup-python@v5
        if: steps.pick.outputs.issue != ''
        with:
          python-version: "3.11"

      - name: Install Joni with dev + extras (so Claude can run pytest + ruff)
        if: steps.pick.outputs.issue != ''
        run: |
          python -m pip install -e ".[dev,llm,pdf,embed]"
          python -m pip install -e _desi || true

      - name: Claude implements the (non-core) extension and opens a PR
        if: steps.pick.outputs.issue != ''
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Implement the "joni-auftrag" in issue #${{ steps.pick.outputs.issue }} of this
            repository. First read that issue in full (e.g. `gh issue view
            ${{ steps.pick.outputs.issue }}`): it is a work order Joni (this repo's autonomous
            agent) wrote, asking to EXTEND him outside his protected core. It names the exact
            request, the acceptance criterion, and the component to extend.

            Hard rules (these are the whole point of the order - do not break them):
              * NON-CORE ONLY. You may extend only the module the issue names, which will be one
                of: the semantic measurement channel (src/joni/autonomy/desi_semantics.py,
                embeddings.py), the conflict qualifier (qualify.py), the reading layer
                (sources.py, reader.py), or the emergence layer (emerge.py, strengthen.py).
              * NEVER touch the protected DESi core: do not change Layer-9 operators, the
                scoring/belief logic, the ledger format, the router algorithm, the state
                machine, or the core engine under src/desi_layer9/. Do NOT run
                `python -m joni.autonomy lock` and do NOT alter the core lock.
              * Keep the architecture rule "LLM for language, rules for logic": new logic must
                be deterministic; do not move scoring/orchestration into a model call.
              * Preserve German strings where the codebase uses them.

            Do this:
              1. Implement exactly the extension the issue asks for - no more.
              2. Add focused tests under tests/ that prove the acceptance criterion in the issue.
              3. Run `python -m pytest -q` and `python -m ruff check src tests`; make both pass.
              4. Run `python -m joni.autonomy verify` to confirm the protected core is untouched.
                 If it fails, you changed something you must not have - revert that part.
              5. Open a pull request that references the issue (include "Closes
                 #${{ steps.pick.outputs.issue }}"), explains what you extended and how the
                 acceptance criterion is met, and states that the protected core was not
                 touched. Do NOT merge it yourself - a follow-up step auto-merges it once the
                 checks (ruff / pytest / core-verify) pass on the branch.

            If the request cannot be done without touching the protected core, do NOT force it:
            open no PR, and instead comment on the issue explaining that it needs the
            human-approval (joni-core-ask) path, then stop.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 30

      - name: Auto-merge the Auftrag PR when the checks are green (non-core, no human needed)
        if: steps.pick.outputs.issue != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          issue="${{ steps.pick.outputs.issue }}"
          repo="$GITHUB_REPOSITORY"
          # Find the PR Claude opened for this Auftrag (it references the issue in its body).
          pr=$(gh pr list --repo "$repo" --state open --json number,body,createdAt \
                --jq "map(select(.body | test(\"#${issue}\"))) | sort_by(.createdAt) | last | .number // empty")
          if [ -z "$pr" ]; then
            echo "no PR opened (Claude likely routed this to the human core-ask path) - nothing to merge"
            exit 0
          fi
          head=$(gh pr view "$pr" --repo "$repo" --json headRefName --jq .headRefName)
          echo "verifying PR #$pr ($head) before auto-merge"
          # GITHUB_TOKEN-opened PRs do NOT trigger ci.yml, so run the very same checks here, on
          # the PR head: ruff + pytest (what ci.yml runs) plus the protected-core fail-safe.
          git fetch origin "$head"
          git checkout "$head"
          python -m pip install -e ".[dev,llm,pdf,embed]" >/dev/null 2>&1 || true
          ok=1
          python -m ruff check . || ok=0
          python -m pytest -q || ok=0
          python -m joni.autonomy verify || ok=0
          if [ "$ok" = "1" ]; then
            gh pr merge "$pr" --repo "$repo" --squash --delete-branch
            echo "auto-merged PR #$pr - Joni's non-core extension is live; the issue auto-closes"
          else
            gh pr comment "$pr" --repo "$repo" --body "Auto-merge held: the checks (ruff / pytest / \`joni.autonomy verify\`) are not green on this branch, so it was **not** merged. A human should review and fix it."
            gh issue comment "$issue" --repo "$repo" --body "The auto-build opened PR #$pr but its checks did not pass, so it was not auto-merged. A human needs to look."
            echo "checks not green - left PR #$pr for a human"
            exit 1
          fi
